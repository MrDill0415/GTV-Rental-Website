<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTV Rental — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <h1>GTV Rental</h1>
        <p>Media Class Equipment Management</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">Sign In</button>
      </form>

      <p class="text-muted" style="text-align:center;margin-top:1.5rem;font-size:.8rem;">
        Contact your teacher if you don't have an account.
      </p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // redirect if already logged in
    const existing = DB.currentUser();
    if (existing) {
      window.location.href = existing.isAdmin ? 'admin.html' : 'user.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const user = DB.login(username, password);
      if (!user) {
        const err = document.getElementById('loginError');
        err.textContent = 'Incorrect username or password. Try again.';
        err.style.display = 'block';
        return;
      }
      window.location.href = user.isAdmin ? 'admin.html' : 'user.html';
    });
  </script>
</body>
</html>
